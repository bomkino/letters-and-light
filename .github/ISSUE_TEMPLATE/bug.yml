name: Bug
description: Something broke, lied or got in the way.
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      description: Include the route, step and the smallest sequence that reproduces it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      placeholder: Firefox 128, macOS 15.5
    validations:
      required: true
  - type: textarea
    id: access
    attributes:
      label: Accessibility or privacy impact
      description: Mention keyboard, screen-reader, motion, contrast, persistence or image-data concerns.
